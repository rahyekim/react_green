<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또번호 생성기</title>
</head>
<body>
    <div class="">
        <label for=""> 고정수(콤마로 구분)</label>
        <input type="text" id="fixedNumbers" placeholder="예 2,17,21">
    </div>

    <div class="">
        <label for="">생성 조합수 </label>
        <select name="" id="comboCount">
            <option value="1">1게임(1000원)</option>
            <option value="2">2게임(2000원)</option>
            <option value="3">3게임(3000원)</option>
            <option value="4">4게임(4000원)</option>
            <option value="5">5게임(5000원)</option>
            <option value="10">10게임(10000원)</option>
        </select>
    </div>

    <br>

    <button onclick="generateLotto()">번호생성하기</button>
    
    <div id="result"></div>

    <script src="js/lotto.js"></script>
  
</body>
</html>
